<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 100vw;
            height: 50vh;
            background-image: linear-gradient(20deg,red 10%, blue );
        }

        .box2 {
            width: 100vw;
            height: 50vh;
            background-image: radial-gradient(red 30%, blue );
        }
        .box3 {
            width: 100vw;
            height: 50vh;
            background-image: linear-gradient(red 10px, blue 10px);
        }
    </style>
</head>

<body>
    <div class="box"></div><br>
    <div class="box2"></div><br>
    <div class="box3"></div><br>
</body>

</html>
